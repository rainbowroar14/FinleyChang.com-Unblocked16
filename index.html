<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape North Koria Simulator</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      var p = location.pathname || "/";
      var i = p.lastIndexOf("/");
      window.GAME_BASE = i >= 0 ? p.slice(0, i + 1) : "/";
    })();
  </script>
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="640" height="360"></canvas>

    <div id="dialog-ui">
      <div id="dialog-box">
        <p id="dialog-text"></p>
        <span id="dialog-arrow" class="hidden">▼</span>
      </div>
    </div>

    <div id="e-prompt" class="hidden" aria-hidden="true">
      <span class="e-key">E</span>
    </div>

    <div id="fade-overlay"></div>

    <div id="money-ui" class="hidden" aria-live="polite">₩ 0</div>

    <div id="controls-hint" class="hidden">
      <p>WASD — move around</p>
      <p>E — use doors / objects</p>
    </div>
  </div>

  <div id="load-error" class="hidden">
    Game failed to load. Make sure <strong>game.js</strong> is in the same folder as this file.
  </div>

  <script src="sprites.js?v=5"></script>
  <script src="slots.js?v=5"></script>
  <script src="outside.js?v=5"></script>
  <script src="game.js?v=5"></script>
</body>
</html>
